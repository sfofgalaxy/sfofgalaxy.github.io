- title: "Enhanced Structured Lasso Pruning with Class-wise Information"
  authors: "Xiang Liu*, Mingchen Li*, Xia Li†, Leigang Qu, Guansu Wang, **Zifan Peng**, Yijun Song, Zemin Liu, Linshan Jiang†, Jialin Li"
  venue: "arXiv preprint arXiv:2502.09125"
  year: 2025
  topic: human-centered-ai
  summary: "This work improves neural network pruning by preserving class-wise information with structured lasso methods."
  abstract: >-
    Modern applications require lightweight neural network models, but many pruning methods remove filters without sufficiently preserving class-wise information. This work uses structured lasso and Information Bottleneck theory to prune filters while retaining statistical information before and after pruning. It proposes sparse graph-structured lasso pruning and sparse tree-guided lasso pruning with more precise class-wise relatedness. Experiments across datasets and model architectures reduce parameters and FLOPs while maintaining accuracy, including strong results on CIFAR-10 and ImageNet.
