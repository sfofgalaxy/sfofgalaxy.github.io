- title: "GPLab: A Generative Agent-Based Framework for Policy Simulation and Evaluation"
  authors: "Shuhan Zhang†, **Zifan Peng**, Yinwang Ren"
  venue: "Journal of Artificial Societies & Social Simulation, 29(1), 1"
  year: 2026
  topic: human-centered-ai
  summary: "GPLab uses LLM-driven agents to simulate social policy effects before deployment."
  abstract: >-
    Real-world social policy problems invariably involve complex dynamics with cross-domain, multi-factor interactions, posing significant challenges to ex-ante policy simulation and impact evaluation. Traditional statistical modeling approaches often fail to adequately capture individual behavioral heterogeneity and system-level dynamic propagation effects, while conventional agent-based modeling relies heavily on hand-crafted behavioral rules. GPLab integrates generative large language models with modular social system architecture, enabling bounded-rational agents to interact across policy-relevant subsystems. Case studies and cross-domain experiments show that the framework can capture policy-intensity effects, group heterogeneity, and opinion evolution patterns for public decision support.
