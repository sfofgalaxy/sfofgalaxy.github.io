- title: "Source Coverage and Citation Bias in LLM-based vs. Traditional Search Engines"
  authors: "Peixian Zhang*, Qiming Ye*, **Zifan Peng**, Kiran Garimella, Gareth Tyson"
  venue: "arXiv preprint arXiv:2512.09483"
  year: 2025
  topic: trustworthy-ai
  summary: "This work compares citation diversity, credibility, neutrality, and safety in LLM-based and traditional search engines."
  abstract: >-
    LLM-based search engines introduce a new paradigm for information seeking by summarizing results, often with limited citation transparency. This paper presents a large-scale empirical study across 55,936 queries, six LLM-based search engines, and two traditional search engines. It finds that LLM-based search engines cite a more diverse set of domains, with many domains unique to them, but they do not consistently outperform traditional search engines on credibility, political neutrality, or safety metrics. A feature-based analysis further identifies factors that influence source selection.
