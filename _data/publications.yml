- title: "\"I Can See Forever!\": Evaluating Real-time VideoLLMs for Assisting Individuals with Visual Impairments"
  authors: "Ziyi Zhang*, Zhen Sun*, Zongmin Zhang, **Zifan Peng**, Yuemeng Zhao, Zichun Wang, Zeren Luo, Ruiting Zuo, Xinlei He†"
  venue: "arXiv preprint arXiv:2505.04488"
  year: 2025
  topic: human-centered-ai
  summary: "This work evaluates real-time VideoLLMs for assistive scenarios involving visually impaired users."
  abstract: >-
    Visually impaired people face significant challenges in daily activities, and prior vision-language assistance often focuses on static content rather than real-time perception. This work evaluates real-time VideoLLMs for supporting daily life through a user survey, the VisAssistDaily benchmark, and a user study on hazard perception. It also proposes SafeVid, an environment-awareness dataset, and fine-tunes VITA-1.5 to improve risk recognition accuracy. The study provides empirical guidance for future assistive VideoLLM systems.
