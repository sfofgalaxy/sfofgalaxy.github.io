- title: "Combating the COVID-19 Infodemic Using Prompt-Based Curriculum Learning"
  authors: "**Zifan Peng**, Mingchen Li, Yue Wang†, George T.S. Ho"
  venue: "Expert Systems with Applications, 229, 120501"
  year: 2024
  topic: human-centered-ai
  summary: "This work combats COVID-19 misinformation with prompt-based curriculum learning for low-resource text classification."
  abstract: >-
    The COVID-19 pandemic was accompanied by widespread online misinformation and disinformation. This paper combats the COVID-19 infodemic by determining the credibility of information, its potential societal harm, and the need for intervention. It proposes a prompt-based curriculum learning method to address data sparsity and class imbalance in social media text. Experiments show that prompt tuning and curriculum learning improve reliability assessment and outperform typical text classification methods such as fastText and BERT.
