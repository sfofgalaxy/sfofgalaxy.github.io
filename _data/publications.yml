- title: "Humanizing LLMs: A Survey of Psychological Measurements with Tools, Datasets, and Human-Agent Applications"
  authors: "Wenhan Dong*, Yuemeng Zhao*, Zhen Sun, Yule Liu, **Zifan Peng**, Jingyi Zheng, Zongmin Zhang, Ziyi Zhang, Jun Wu, Ruiming Wang, Shengmin Xu, Xinyi Huang, Xinlei He†"
  venue: "arXiv preprint arXiv:2505.00049"
  year: 2025
  topic: human-centered-ai
  summary: "This survey maps psychological measurement methods, datasets, and applications for LLMs."
  abstract: >-
    As large language models are increasingly used in human-centered tasks, evaluating their psychological traits is important for social impact and trustworthy alignment. This survey reviews assessment tools, LLM-specific datasets, evaluation metrics, empirical findings, personality simulation methods, and LLM-based behavior simulation. It highlights both the strengths and limitations of current approaches, including variability across tasks and settings, mismatches between psychological tools and model capabilities, and inconsistent evaluation practices. The paper proposes directions for more interpretable and robust psychological assessment frameworks.
