- title: "Thought Manipulation: External Thought Can Be Efficient for Large Reasoning Models"
  authors: "Yule Liu, Jingyi Zheng, Zhen Sun, **Zifan Peng**, Wenhan Dong, Zeyang Sha, Shiwen Cui, Weiqiang Wang, Xinlei He†"
  venue: "arXiv preprint arXiv:2504.13626"
  year: 2025
  topic: trustworthy-ai
  summary: "Thought Manipulation reduces overthinking in large reasoning models by steering reasoning with external chains of thought."
  abstract: >-
    Large reasoning models benefit from test-time computation, but they often overthink by producing redundant reasoning steps with limited performance gains. This work shows that placing external chains of thought generated by smaller models inside thinking-token boundaries can cause large reasoning models to generate fewer thoughts. The proposed pipeline reduces output token counts while preserving performance in representative reasoning settings, and it analyzes failure modes such as following flawed external thoughts or unnecessarily rethinking. The method offers a practical way to improve inference efficiency for large reasoning models.
