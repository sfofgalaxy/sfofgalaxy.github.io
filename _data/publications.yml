- title: "GasAgent: A Multi-Agent Framework for Automated Gas Optimization in Smart Contracts"
  authors: "Jingyi Zheng*, **Zifan Peng***, Yule Liu, Junfeng Wang, Yifan Liao, Wenhan Dong, Xinlei He†"
  venue: "arXiv preprint arXiv:2507.15761"
  year: 2025
  topic: decentralized-systems
  summary: "GasAgent uses collaborating agents to discover, validate, and apply smart-contract gas optimizations."
  abstract: >-
    Smart contracts require gas-efficient execution, but many contracts contain waste patterns that are costly to discover and maintain manually. GasAgent is a multi-agent system for smart contract gas optimization that combines compatibility with existing patterns and automated discovery and validation of new patterns. Its Seeker, Innovator, Executor, and Manager agents collaborate in a closed loop to identify, validate, and apply gas-saving improvements. Experiments on verified contracts and LLM-generated contracts show practical deployment gas savings and broad usability as an optimization layer.
