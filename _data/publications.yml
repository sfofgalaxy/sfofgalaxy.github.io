- title: "NL2Repo-Bench: Towards Long-Horizon Repository Generation Evaluation of Coding Agents"
  authors: "**Zifan Peng**, etc."
  venue: "International Conference on Machine Learning"
  year: 2026
  topic: human-centered-ai
  summary: "NL2Repo-Bench evaluates whether coding agents can build complete repositories from natural-language requirements."
  abstract: >-
    Recent advances in coding agents suggest progress toward autonomous software development, yet existing benchmarks do not rigorously evaluate the long-horizon capabilities required to build complete software systems. NL2Repo-Bench evaluates repository generation from a single natural-language requirements document and an empty workspace, requiring agents to design architecture, manage dependencies, implement multi-module logic, and produce a fully installable Python library. Experiments across open- and closed-source models show that long-horizon repository generation remains largely unsolved, with common failures including premature termination, loss of global coherence, fragile cross-file dependencies, and inadequate planning.
