- title: "Unsafe LLM-Based Search: Quantitative Analysis and Mitigation of Safety Risks in AI Web Search"
  authors: "Zeren Luo*, **Zifan Peng***, Yule Liu, Zhen Sun, Mingchen Li, Jingyi Zheng, Xinlei He†"
  venue: "USENIX Security Symposium"
  year: 2025
  topic: trustworthy-ai
  summary: "This paper quantifies and mitigates safety risks in AI-powered web search."
  abstract: >-
    AI-powered search engines can provide precise answers by combining external databases with model knowledge, but they also risk quoting malicious content or citing unsafe websites. This study defines threat models and risk types, then evaluates seven production systems across multiple query settings. It finds that AI-powered search engines can generate harmful content with malicious URLs even for benign queries, and it develops an agent-based defense using content refinement and URL detection to reduce risk with only modest loss of available information.
