- title: "What Your Posts Reveal: A Benchmark and Agentic Framework for User-Level Privacy Leakage on Social Media"
  authors: "**Zifan Peng***, Yini Huang*, Aiwen Lu*, Qiming Ye, Peixian Zhang, Jingyi Zheng, Yule Liu, Xuechao Wang, Xinlei He†, Jiaheng Wei†"
  venue: "arXiv preprint arXiv:2606.06784"
  year: 2026
  topic: trustworthy-ai
  summary: "This work benchmarks user-level privacy leakage on social media and evaluates an agentic framework for cumulative cross-post inference."
  abstract: >-
    Public social media posts can reveal private information through weak signals spread across text, images, and metadata, especially when cues accumulate across posts. This work introduces SopriBench, a synthetic benchmark for user-level multimodal privacy leakage guided by leakage patterns from Rednote and Instagram accounts, and proposes the Privacy Exposure Score to measure exposure severity beyond binary correctness. It further presents Argus, a training-free agentic framework that forms hypotheses from accumulated evidence, verifies support, and aggregates cross-post cues into privacy profiles, improving privacy leakage inference over existing baselines.
