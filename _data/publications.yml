- title: "On the Generation and Mitigation of Harmful Geometry in Image-to-3D Models"
  authors: "Yule Liu, Yilong Yang, Jiale Teng, Hanze Jia, Zeren Luo, Jingyi Zheng, **Zifan Peng**, Ke Li, Yifan Liao, Zhen Sun, Jiaheng Wei, Yang Liu, Zhuo Ma, Xinlei He†"
  venue: "arXiv preprint arXiv:2605.09606"
  year: 2026
  topic: trustworthy-ai
  summary: "This work measures whether image-to-3D systems can generate harmful geometries and evaluates geometry-aware safeguards."
  abstract: >-
    Image-to-3D systems make 3D content creation more accessible, but they can also reconstruct unsafe physical geometries that may create real-world risks. This work studies harmful geometry generation across direct-use physical hazards, risky components, and deceptive replicas, evaluating open-source and commercial systems under original, degraded, viewpoint-shifted, and semantically camouflaged inputs. It combines geometric validity checks, multi-view vision-language scoring, human validation, and controlled fabrication to assess risk and moderation. The results show that existing safeguards rarely catch such outputs, and the paper evaluates input moderation, model-level alignment, output filtering, and a stacked defense as first steps toward better geometry-aware safeguards.
