- title: "CHASM: Unveiling Covert Advertisements on Chinese Social Media"
  authors: "Jingyi Zheng*, Tianyi Hu*, Yule Liu, Zhen Sun, Zongmin Zhang, **Zifan Peng**, Wenhan Dong†, Xinlei He†"
  venue: "Conference on Neural Information Processing Systems"
  year: 2025
  topic: trustworthy-ai
  summary: "CHASM investigates covert advertising behavior on Chinese social media."
  abstract: >-
    Current benchmarks for evaluating large language models in social media moderation overlook covert advertisements, which disguise themselves as regular posts and can mislead consumers. CHASM is a manually curated multimodal dataset of 4,992 Rednote instances for evaluating the ability of MLLMs to detect covert advertisements. The results show that current MLLMs remain unreliable under zero-shot and in-context learning, while fine-tuning improves performance but still leaves challenges such as subtle cues in comments and differences in visual and textual structures.
