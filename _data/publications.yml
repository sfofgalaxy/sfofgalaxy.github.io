- title: "SuperGPQA: Scaling LLM Evaluation across 285 Graduate Disciplines"
  authors: "**Zifan Peng**, etc."
  venue: "Conference on Neural Information Processing Systems"
  year: 2025
  topic: human-centered-ai
  summary: "SuperGPQA expands graduate-level LLM evaluation across hundreds of specialized disciplines."
  abstract: >-
    Large language models perform well in mainstream academic disciplines, but human knowledge spans many specialized fields that existing benchmarks do not cover. SuperGPQA evaluates graduate-level knowledge and reasoning across 285 disciplines using a Human-LLM collaborative filtering mechanism to remove trivial or ambiguous questions. Experiments show that current state-of-the-art models still have significant room for improvement across diverse knowledge domains, and the project offers methodological insights for managing large-scale expert annotation.
