- title: "Cross-Chain Options: A Bridgeless, Universal, and Efficient Approach"
  authors: "**Zifan Peng**, Yingjie Xue†, Jingyu Liu"
  venue: "IEEE International Conference on Web Services"
  year: 2025
  topic: decentralized-systems
  summary: "This protocol enables trustless cross-chain options without bridges or upfront holder collateral."
  abstract: >-
    Options are important tools for risk management and speculation in decentralized finance, but current mechanisms often rely on trusted third parties, support limited assets, suffer high delays, or require holders to provide upfront collateral. This work presents a cross-chain options protocol that eliminates holder collateral in trustless environments by introducing a guarantee from the option writer. Its design supports options involving assets on different blockchains when the chains can execute the required contract logic, and it uses Double-Authentication-Preventing Signatures to reduce position transfer latency. Security analysis and evaluation show secure option trading and lower transfer latency than existing methods.
