- title: "Prompt-based Contrastive Learning to Combat the COVID-19 Infodemic"
  authors: "**Zifan Peng**, Mingchen Li, Yue Wang†, Daniel Y. Mo"
  venue: "Machine Learning, 114(1), 6"
  year: 2025
  topic: human-centered-ai
  summary: "This paper uses prompt-based contrastive learning to assess COVID-19 misinformation under sparse and imbalanced data."
  abstract: >-
    The COVID-19 pandemic brought an influx of misinformation and disinformation online, especially on social media. This study presents a prompt-based contrastive learning approach for combating the infodemic under data scarcity and class imbalance. It models infodemic response as a series of text classification tasks about credibility, societal harm, and the need for intervention. Experiments show that prompt-based contrastive learning is effective in assessing the accuracy of COVID-19-related online text.
