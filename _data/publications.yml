- title: "\"What Did It Actually Do?\": Understanding Risk Awareness and Traceability for Computer-Use Agents"
  authors: "**Zifan Peng**, Mingchen Li"
  venue: "arXiv preprint arXiv:2603.28551"
  year: 2026
  topic: human-centered-ai
  summary: "This work studies how users understand and audit computer-use agents after delegated tasks."
  abstract: >-
    Personalized computer-use agents can install skills, invoke tools, access private resources, and modify local environments, leaving users uncertain about delegated authority, executed actions, and persistent side effects. This work investigates risk understanding and post-hoc auditability using OpenClaw as a motivating case. It builds a multi-source ecosystem corpus and conducts interviews about skills, autonomy, privilege, persistence, and uninstallation. Motivated by the findings, it proposes AgentTrace, a traceability framework and prototype interface that visualizes agent actions, touched resources, permission history, provenance, and persistent side effects. A scenario-based evaluation suggests that these views can help users understand agent behavior, detect anomalies, and calibrate trust.
