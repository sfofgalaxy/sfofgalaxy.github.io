- title: "FairRelay: Fair and Cost-Efficient Peer-to-Peer Content Delivery through Payment Channel Networks"
  authors: "Jingyu Liu, Yingjie Xue, **Zifan Peng**, Chao Lin, Xinyi Huang"
  venue: "IEEE Transactions on Dependable and Secure Computing"
  year: 2025
  topic: decentralized-systems
  summary: "FairRelay provides fair, low-cost payment settlement for multi-hop peer-to-peer content delivery."
  abstract: >-
    Peer-to-peer content delivery offers a decentralized alternative to traditional content delivery networks, but fair compensation for relayers remains difficult. FairRelay is a fair and cost-efficient protocol for complex content delivery network settings. It introduces Enforceable Accumulative Hashed TimeLock Contract to guarantee payment atomicity, and proves fairness using the Universal Composability framework. Evaluation shows zero on-chain costs in optimistic scenarios, constant dispute costs in pessimistic scenarios, and low transmission overhead in multi-hop relay paths.
