- title: "JALMBench: Benchmarking Jailbreak Vulnerabilities in Audio Language Models"
  authors: "**Zifan Peng**, Yule Liu, Zhen Sun, Mingchen Li, Zeren Luo, Jingyi Zheng, Wenhan Dong†, Xinlei He†, Xuechao Wang, Yingjie Xue, Shengmin Xu, Xinyi Huang"
  venue: "International Conference on Learning Representations"
  year: 2026
  topic: trustworthy-ai
  summary: "JALMBench measures how audio language models behave under jailbreak attacks and defenses."
  abstract: >-
    Large Audio Language Models have made significant progress. While increasingly deployed in real-world applications, they face growing safety risks from jailbreak attacks that bypass safety alignment. JALMBench provides a benchmark for assessing LALM safety against jailbreak attacks, with 11,316 text samples and 245,355 audio samples across mainstream models, attack methods, and defenses. The evaluation shows that modality and model architecture strongly affect safety, that text-based safety alignment can partially transfer to audio, and that audio-specific defenses remain necessary.
