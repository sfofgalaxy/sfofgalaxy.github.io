- title: "ZPD-SCA: Unveiling the Blind Spots of LLMs in Assessing Students' Cognitive Abilities"
  authors: "Wenhan Dong, Zhen Sun, Yuemeng Zhao, **Zifan Peng**, Jun Wu, Jingyi Zheng, Yule Liu, Xinlei He†, Yu Wang, Ruiming Wang, Xinyi Huang, Lei Mo†"
  venue: "arXiv preprint arXiv:2508.14377"
  year: 2025
  topic: human-centered-ai
  summary: "ZPD-SCA evaluates whether LLMs can judge reading difficulty for cognitively aligned education."
  abstract: >-
    Large language models show promise in education, but their ability to assess whether reading materials match students' developmental stages remains underexplored. ZPD-SCA is a benchmark for evaluating stage-level Chinese reading comprehension difficulty, annotated by expert teachers. Experiments show that LLMs perform poorly in zero-shot settings but improve substantially with in-context examples, while still displaying systematic biases and genre-dependent variation. The benchmark supports evaluation and improvement of cognitively aligned educational applications.
