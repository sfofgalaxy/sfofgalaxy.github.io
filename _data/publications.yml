- title: "Auditing Data Membership in Reinforcement Learning With Verifiable Rewards"
  authors: "Yule Liu, Heyi Zhang, Jinyi Zheng, Zhen Sun, **Zifan Peng**, Jiaheng Wei, Tianshuo Cong, Yilong Yang†, Xinlei He†"
  venue: "arXiv preprint arXiv:2511.14045"
  year: 2025
  topic: trustworthy-ai
  summary: "This paper studies data membership auditing in RLVR-trained models through prompt-conditioned behavioral traces."
  abstract: >-
    Reinforcement Learning with Verifiable Rewards has become a core training stage in recent large language models, and its reliance on non-public prompt sets creates a need for exposure auditing. This work shows that RLVR can leave detectable behavioral traces on training prompts, even when classic membership inference approaches are not directly applicable. It proposes Divergence-in-Behavior Auditing, a query-level framework that compares a fine-tuned model with its pre-RLVR checkpoint using reward-side and policy-side evidence. Experiments show strong auditing performance under white-box settings and useful transfer under practical grey-box settings.
